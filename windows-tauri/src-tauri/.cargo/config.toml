# Cross-compile config for building Windows artifacts from macOS via cargo-xwin.
# Requires:
#   brew install llvm
#   cargo install cargo-xwin
#   rustup target add aarch64-pc-windows-msvc x86_64-pc-windows-msvc

[target.aarch64-pc-windows-msvc]
linker = "lld-link"

[target.x86_64-pc-windows-msvc]
linker = "lld-link"

[env]
CC_aarch64_pc_windows_msvc = "/opt/homebrew/opt/llvm/bin/clang-cl"
CXX_aarch64_pc_windows_msvc = "/opt/homebrew/opt/llvm/bin/clang-cl"
AR_aarch64_pc_windows_msvc = "/opt/homebrew/opt/llvm/bin/llvm-lib"
RC_aarch64_pc_windows_msvc = "/opt/homebrew/opt/llvm/bin/llvm-rc"

CC_x86_64_pc_windows_msvc = "/opt/homebrew/opt/llvm/bin/clang-cl"
CXX_x86_64_pc_windows_msvc = "/opt/homebrew/opt/llvm/bin/clang-cl"
AR_x86_64_pc_windows_msvc = "/opt/homebrew/opt/llvm/bin/llvm-lib"
RC_x86_64_pc_windows_msvc = "/opt/homebrew/opt/llvm/bin/llvm-rc"
