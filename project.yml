name: LoomTestingEdition
options:
  bundleIdPrefix: com.chasesims
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    # MARKETING_VERSION is the user-visible semver on the Testing Edition
    # branch. Always one or more minors ahead of the latest stable Loom
    # release, so the pill never shows a code lower than what's on main.
    # Bump this manually before each testing release; release-testing.sh
    # reads it back out and tags the GitHub pre-release `testing-<version>`.
    MARKETING_VERSION: "8.0.17"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Loom Local Codesign"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  LoomTestingEdition:
    type: application
    platform: macOS
    sources:
      - path: Loom
        excludes:
          - "**/* 2.swift"
          - "**/* 3.swift"
          - "**/* 2.json"
          - "**/* 2.plist"
          - "**/* 2.entitlements"
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    info:
      path: Loom/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.developer-tools
        CFBundleName: "Loom Testing Edition"
        CFBundleDisplayName: "Loom Testing Edition"
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: "© 2026 BigBeardedMan"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.chasesims.Loom.url
            CFBundleURLSchemes:
              - loom
    entitlements:
      path: Loom/Loom.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_NAME: "Loom Testing Edition"
        PRODUCT_BUNDLE_IDENTIFIER: com.chasesims.LoomTestingEdition
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: Sweep iCloud shadow duplicates
        script: |
          /usr/bin/find "$SRCROOT/Loom" \( -name "* 2.*" -o -name "* 3.*" \) -delete 2>/dev/null || true
        runOnlyWhenInstalling: false
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Strip extended attributes (iCloud / Finder)
        script: |
          /usr/bin/xattr -cr "$TARGET_BUILD_DIR/$WRAPPER_NAME" || true
        runOnlyWhenInstalling: false
        basedOnDependencyAnalysis: false
