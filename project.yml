name: Loom
options:
  bundleIdPrefix: com.chasesims
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "3.1.2"
    CURRENT_PROJECT_VERSION: "51"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Loom Local Codesign"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  Loom:
    type: application
    platform: macOS
    sources:
      - path: Loom
        excludes:
          - "**/* 2.swift"
          - "**/* 3.swift"
          - "**/* 2.json"
          - "**/* 2.plist"
          - "**/* 2.entitlements"
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    info:
      path: Loom/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.developer-tools
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: "© 2026 BigBeardedMan"
    entitlements:
      path: Loom/Loom.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chasesims.Loom
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: Sweep iCloud shadow duplicates
        script: |
          /usr/bin/find "$SRCROOT/Loom" \( -name "* 2.*" -o -name "* 3.*" \) -delete 2>/dev/null || true
        runOnlyWhenInstalling: false
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Strip extended attributes (iCloud / Finder)
        script: |
          /usr/bin/xattr -cr "$TARGET_BUILD_DIR/$WRAPPER_NAME" || true
        runOnlyWhenInstalling: false
        basedOnDependencyAnalysis: false
