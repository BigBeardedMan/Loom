name: Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (MAJOR.MINOR.PATCH, e.g. 4.0.0)"
        required: true

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_suffix: x64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_suffix: arm64

    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: windows-tauri

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate release version
        id: release_version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must be MAJOR.MINOR.PATCH semver, got '$VERSION'" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "tag '${GITHUB_REF_NAME}' does not match version '${VERSION}'" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: windows-tauri/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target }}

      - name: Install WebView2 runtime check
        shell: pwsh
        run: |
          if (-not (Test-Path "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}")) {
            Write-Host "WebView2 not present, installing..."
            Invoke-WebRequest -Uri https://go.microsoft.com/fwlink/p/?LinkId=2124703 -OutFile MicrosoftEdgeWebview2Setup.exe
            Start-Process -FilePath .\MicrosoftEdgeWebview2Setup.exe -ArgumentList "/silent /install" -Wait
          }

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (${{ matrix.target }})
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" || -z "${TAURI_UPDATER_PUBLIC_KEY:-}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY and TAURI_UPDATER_PUBLIC_KEY are required" >&2
            exit 1
          fi
          node -e '
            const fs = require("fs");
            const path = "src-tauri/tauri.conf.json";
            const json = JSON.parse(fs.readFileSync(path, "utf8"));
            json.plugins.updater.pubkey = process.env.TAURI_UPDATER_PUBLIC_KEY;
            fs.writeFileSync(path, JSON.stringify(json, null, 2) + "\n");
          '
          pnpm tauri build --target ${{ matrix.target }}

      - name: Stage artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          out="release-artifacts"
          rm -rf "$out"
          mkdir -p "$out"

          bundle="src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          shopt -s nullglob
          installers=("$bundle"/*-setup.exe)
          if (( ${#installers[@]} != 1 )); then
            echo "expected exactly one NSIS setup installer in $bundle, found ${#installers[@]}" >&2
            printf 'found: %s\n' "${installers[@]}" >&2
            exit 1
          fi

          installer_name="$(basename "${installers[0]}")"
          cp "${installers[0]}" "$out/$installer_name"
          pnpm tauri signer sign -p "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$out/$installer_name"
          test -s "$out/$installer_name.sig"
          find "$out" -maxdepth 1 -type f -print

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: loom-windows-${{ matrix.artifact_suffix }}
          path: windows-tauri/release-artifacts/*
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
      - name: Build latest-windows.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "bad release tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          find dist -maxdepth 3 -type f -print
          NSIS_X64=$(find dist -name "*x64-setup.exe" | head -n1)
          NSIS_ARM=$(find dist -name "*arm64-setup.exe" | head -n1)
          SIG_X64="${NSIS_X64}.sig"
          SIG_ARM="${NSIS_ARM}.sig"
          for file in "$NSIS_X64" "$NSIS_ARM" "$SIG_X64" "$SIG_ARM"; do
            if [[ ! -s "$file" ]]; then
              echo "missing required Windows release artifact: ${file:-<empty match>}" >&2
              exit 1
            fi
          done
          SIG_X64_BODY=$(tr -d '\r\n' < "$SIG_X64")
          SIG_ARM_BODY=$(tr -d '\r\n' < "$SIG_ARM")
          NOTES="Loom ${VERSION}"
          cat > latest-windows.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "${NOTES}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG_X64_BODY}",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$NSIS_X64")"
              },
              "windows-aarch64": {
                "signature": "${SIG_ARM_BODY}",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$NSIS_ARM")"
              }
            }
          }
          EOF
          mv latest-windows.json dist/
      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: dist/**/*
          generate_release_notes: true
          # When the macOS local release.sh has already created the v$VERSION
          # release with the DMG attached, this step appends our NSIS assets
          # to it instead of erroring out.
          fail_on_unmatched_files: false
