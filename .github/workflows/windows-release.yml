name: Windows Release

on:
  push:
    tags:
      - "windows-v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_suffix: x64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_suffix: arm64

    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: windows-tauri

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: windows-tauri/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install WebView2 runtime check
        shell: pwsh
        run: |
          if (-not (Test-Path "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}")) {
            Write-Host "WebView2 not present, installing..."
            Invoke-WebRequest -Uri https://go.microsoft.com/fwlink/p/?LinkId=2124703 -OutFile MicrosoftEdgeWebview2Setup.exe
            Start-Process -FilePath .\MicrosoftEdgeWebview2Setup.exe -ArgumentList "/silent /install" -Wait
          }

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (${{ matrix.target }})
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Stage artifacts
        shell: pwsh
        run: |
          $out = "release-artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $bundle = "src-tauri/target/${{ matrix.target }}/release/bundle"
          Get-ChildItem -Path "$bundle/msi" -Filter *.msi -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName -Destination $out }
          Get-ChildItem -Path "$bundle/nsis" -Filter *.exe -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName -Destination $out }
          Get-ChildItem -Path "$bundle/msi" -Filter *.sig -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName -Destination $out }
          Get-ChildItem -Path "$bundle/nsis" -Filter *.sig -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName -Destination $out }
          Get-ChildItem $out

      - uses: actions/upload-artifact@v4
        with:
          name: loom-windows-${{ matrix.artifact_suffix }}
          path: windows-tauri/release-artifacts/*
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/windows-v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Build latest-windows.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#windows-v}"
          MSI_X64=$(find dist -name "*x64*.msi" -o -name "*x86_64*.msi" | head -n1)
          MSI_ARM=$(find dist -name "*arm64*.msi" -o -name "*aarch64*.msi" | head -n1)
          NOTES="Loom Windows ${VERSION}"
          cat > latest-windows.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "${NOTES}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$MSI_X64")"
              },
              "windows-aarch64": {
                "signature": "",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$MSI_ARM")"
              }
            }
          }
          EOF
          mv latest-windows.json dist/
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
