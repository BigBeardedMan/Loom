name: Windows Release (Testing Edition)

on:
  push:
    tags:
      - "testing-*"
  workflow_dispatch:
    inputs:
      build_code:
        description: "Build code (10 char alphanumeric, e.g. f1ac68e9b2)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_suffix: x64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_suffix: arm64

    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: windows-tauri

    steps:
      - uses: actions/checkout@v4

      - name: Derive build code
        id: build_code
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.build_code }}" ]]; then
            CODE="${{ inputs.build_code }}"
          else
            CODE="${GITHUB_REF_NAME#testing-}"
          fi
          echo "value=$CODE" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: windows-tauri/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install WebView2 runtime check
        shell: pwsh
        run: |
          if (-not (Test-Path "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}")) {
            Write-Host "WebView2 not present, installing..."
            Invoke-WebRequest -Uri https://go.microsoft.com/fwlink/p/?LinkId=2124703 -OutFile MicrosoftEdgeWebview2Setup.exe
            Start-Process -FilePath .\MicrosoftEdgeWebview2Setup.exe -ArgumentList "/silent /install" -Wait
          }

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (${{ matrix.target }})
        env:
          # build.rs reads this into the binary as `LOOM_BUILD_CODE` so the
          # About panel and updater show the same alphanumeric code as the
          # tag. Cargo's version stays at the semver placeholder `1.0.0`.
          LOOM_BUILD_CODE: ${{ steps.build_code.outputs.value }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Stage artifacts
        shell: pwsh
        run: |
          $out = "release-artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $bundle = "src-tauri/target/${{ matrix.target }}/release/bundle"
          Get-ChildItem -Path "$bundle/nsis" -Filter *.exe -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName -Destination $out }
          Get-ChildItem -Path "$bundle/nsis" -Filter *.sig -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName -Destination $out }
          Get-ChildItem $out

      - uses: actions/upload-artifact@v4
        with:
          name: loom-testing-windows-${{ matrix.artifact_suffix }}
          path: windows-tauri/release-artifacts/*
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/testing-')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Build latest-windows-testing.json
        shell: bash
        run: |
          set -euo pipefail
          BUILD_CODE="${GITHUB_REF_NAME#testing-}"
          NSIS_X64=$(find dist -name "*x64-setup.exe" | head -n1)
          NSIS_ARM=$(find dist -name "*arm64-setup.exe" | head -n1)
          NOTES="Loom Testing Edition ${BUILD_CODE}"
          cat > latest-windows-testing.json <<EOF
          {
            "version": "${BUILD_CODE}",
            "notes": "${NOTES}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$NSIS_X64")"
              },
              "windows-aarch64": {
                "signature": "",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$NSIS_ARM")"
              }
            }
          }
          EOF
          mv latest-windows-testing.json dist/
      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          prerelease: true
          generate_release_notes: true
          # release-testing.sh creates the pre-release with the DMG; this
          # step appends our NSIS assets to the same tag.
          fail_on_unmatched_files: false
